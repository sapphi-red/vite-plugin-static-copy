name: CI

on:
  push:
    branches:
      - main
      - v*
  pull_request:

jobs:
  lint:
    name: run lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-repo
      - run: pnpm run lint --max-warnings=0
  format:
    name: run format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-repo
      - run: pnpm prettier --check .
  build:
    name: run build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-repo
      - run: pnpm run build
      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist
  type-check:
    name: run type-check
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-repo
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist
      - run: pnpm run type-check
  test:
    name: run test
    needs: [build]
    strategy:
      matrix:
        node_version: [18.x, 20.x, 22.x, 24.x]
        os: [ubuntu-latest]
        include:
          - node_version: 22.x
            os: windows-latest
      fail-fast: false
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-repo
        with:
          node-version: ${{ matrix.node_version }}
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist
      - if: matrix.node_version == '18.x'
        run: |
          yq -i '.overrides.vite = "^6.3.5"' pnpm-workspace.yaml
          yq -i '.overrides["vitest"] = "^4.0.18"' pnpm-workspace.yaml
          pnpm install --no-frozen-lockfile
      - run: pnpm run test
